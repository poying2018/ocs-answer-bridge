name = "ocs-answer-bridge"
main = "worker.js"
compatibility_date = "2024-09-23"

# D1 数据库绑定（部署时自动创建绑定）
[[d1_databases]]
binding = "DB"
database_name = "ocs"
database_id = "<YOUR_D1_DATABASE_ID>"

# 明文环境变量（非敏感）。固化进 toml，避免 `wrangler deploy` 以本地为准时
# 覆盖掉 Dashboard 上手动添加的变量。敏感项（API_KEY/AUTH_KEY）仍走 secret，不要写这里。
[vars]
MODEL = "mimo-v2.5"
API_BASE = "https://api.xiaomimimo.com"
# 缓存版本：改为 "2" 即触发「全量缓存失效」（配合 UNIQUE(title, options, cache_version)）。
# 旧版本答案视为未命中、自动以当前模型/提示词重新生成。未来需要再次失效时递增即可。
CACHE_VERSION = "2"

# 注：自定义域名需在 Cloudflare Dashboard 手动绑定到本 Worker
# （Workers & Pages → ocs-answer-bridge → Settings → Domains & Routes → Add → Custom domain）
# 原因是部署用的 API Token 可能不含 Zone 权限，wrangler 无法自动绑定。
